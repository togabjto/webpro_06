<!DOCTYPE html> 
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掲示板</title>
    <script src="./bbs.js" defer></script>
</head>
<body>
    <h1>BBS</h1>

    <!-- 投稿フォーム -->
    <form id="post-form">
        <input type="text" id="name" placeholder="Your Name">
        <textarea id="message" placeholder="Your Message"></textarea>
        <button type="button" id="post">投稿</button>
    </form>

    <!-- 更新チェック -->
    <button type="button" id="check">更新チェック</button>

    <!-- 特定の投稿を取得 -->
    <h2>Get a Post</h2>
    <input type="text" id="id" placeholder="Enter Post ID">
    <button type="button" id="get-button">検索</button>

    <!-- 投稿の更新 -->
    <h2>Update a Post</h2>
    <input type="text" id="id" placeholder="Enter Post ID">
    <input type="text" id="new-message" placeholder="New Message">
    <button type="button" id="update-button">更新チェック</button>

    <!-- 投稿の削除 -->
    <h2>Delete a Post</h2>
    <input type="text" id="id" placeholder="Enter Post ID">
    <button type="button" id="delete-button">削除</button>

    <!-- 投稿一覧表示エリア -->
    <div id="check">
    <button type="button" id="check">投稿チェック</button>
    </div>


</body>
</html>
